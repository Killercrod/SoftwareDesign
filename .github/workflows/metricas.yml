name: Generar Metricas GitHub

on:
  workflow_dispatch:
    inputs:
      milestone_name:
        description: "Milestone especifica (opcional, exacta)"
        required: false
        default: ""
      include_bots:
        description: "Incluir bots en metricas (true/false)"
        required: false
        default: "false"

jobs:
  run-metricas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub

      - name: Run script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN_METRICAS }}
          MILESTONE_NAME: ${{ github.event.inputs.milestone_name }}
          INCLUDE_BOTS: ${{ github.event.inputs.include_bots }}
        run: |
          python "ScriptMetricas/python metricas.py"

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: metricas-github-csv
          path: ScriptMetricas/metricas_github.csv
          if-no-files-found: error
